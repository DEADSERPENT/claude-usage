name: Build and Release Executables

on:
  push:
    tags:
      - 'v*' # This workflow runs ONLY when push a tag like 'v1.0.1'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: claude-usage-linux
          - os: macos-latest
            asset_name: claude-usage-macos
          - os: windows-latest
            asset_name: claude-usage-windows.exe

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        # Install your project's local dependencies
        pip install -e .

    - name: Build Executable with PyInstaller
      run: pyinstaller --name ${{ matrix.asset_name }} --onefile cli.py

    - name: Upload Binary to GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/${{ matrix.asset_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
