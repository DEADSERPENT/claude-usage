name: Build and Release Executables

on:
  push:
    tags:
      - 'v*' # This workflow runs ONLY when push a tag like 'v1.0.1'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: claude-usage-linux
            mcp_name: claude-usage-mcp-linux
          - os: macos-latest
            asset_name: claude-usage-macos
            mcp_name: claude-usage-mcp-macos
          - os: windows-latest
            asset_name: claude-usage-windows.exe
            mcp_name: claude-usage-mcp-windows.exe

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -e .

    - name: Build Main Executable
      run: >
        pyinstaller
        --name ${{ matrix.asset_name }}
        --onefile
        --add-data "mcp_server.py:."
        cli.py

    - name: Build MCP Server Executable
      run: >
        pyinstaller
        --name ${{ matrix.mcp_name }}
        --onefile
        mcp_server.py

    - name: Upload Binaries to GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/${{ matrix.asset_name }}
          dist/${{ matrix.mcp_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
